<div style="background-color: #f6f6f4; padding: 16px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;">
  <div style="background-color: #f0f0ee; border: 2px solid #002FA7; padding: 20px; max-width: 420px; margin: 0 auto; color: #002FA7; box-sizing: border-box; box-shadow: 0 4px 16px rgba(0,0,0,0.06); display: flex; flex-direction: column;">
    
    <!-- Unified Brand Header -->
    <div style="border-bottom: 1px solid rgba(0,47,167,0.3); padding-bottom: 10px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center;">
      <span style="font-weight: 700; font-size: 14px; letter-spacing: 0.05em;">章鱼 AI 全景分析</span>
      <span style="font-size: 11px; font-family: monospace; opacity: 0.8;">{slot_time} · PORTRAIT CARD</span>
    </div>

    <!-- Title & Kicker -->
    <div style="margin-bottom: 16px;">
      <div style="font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px; opacity: 0.9;">{kicker}</div>
      <h2 style="font-size: 20px; font-weight: 200; margin: 0; line-height: 1.25; letter-spacing: -0.01em;">{title}</h2>
    </div>

    <!-- Vertical Stacked Ledger -->
    <div style="display: flex; flex-direction: column; margin-bottom: 16px; flex: 1;">
      {points_html}
    </div>

    <!-- High-end highlighted Box (章鱼 AI 研判) -->
    <div style="background-color: rgba(0, 47, 167, 0.04); border: 1px solid rgba(0, 47, 167, 0.12); padding: 14px; margin-bottom: 16px; font-size: 13px; line-height: 1.5;">
      <strong style="display: block; font-size: 14px; margin-bottom: 4px;">章鱼 AI 独家研判：</strong>
      {judgment}
    </div>

    <!-- Separator Line -->
    <div style="border-top: 1px solid rgba(0,47,167,0.2); padding-top: 10px; display: flex; justify-content: space-between; align-items: center; font-size: 10px; font-family: monospace; opacity: 0.85;">
      <span>PROCESSED AT {processed_at}</span>
      <span>OCTOPUS PLATFORM ENGINE</span>
    </div>

  </div>
</div>
